<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo-bg-green.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manevo - Gestión de Operaciones</title>
  
  <!-- PWA Metadata & iOS Capabilities -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#13ECDA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/logo-bg-green.svg" />

  <!-- Material Symbols Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Register PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('Manevo Service Worker registrado:', reg.scope))
          .catch((err) => console.error('Error al registrar Service Worker:', err));
      });
    }
  </script>
</body>

</html>
